  - luet repo update && luet i make sys-devel-1.13/automake sys-devel-2.69/autoconf
    git m4 virtual/base bash && luet cleanup --purge-repos && mkdir /root /tmp
  - PACKAGE_VERSION=${PACKAGE_VERSION%\+*} && git config --global advice.detachedHead
    false && git clone https://github.com/geaaru/database-release-manager.git --depth
    1 -b v$PACKAGE_VERSION /dbrm
