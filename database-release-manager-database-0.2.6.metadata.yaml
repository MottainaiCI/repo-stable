    --add-missing && ./configure --with-configfile-path=$DBRM_DEFAULT_CONFPATH --prefix=/usr
    && make && DESTDIR=/database-release-manager/ make install
  env:
  - LUET_YES=true
  - DBRM_DEFAULT_CONFPATH=/etc/dbrm.conf
